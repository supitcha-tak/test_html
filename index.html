<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ทดสอบ WebView Bridge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }
        
        .button-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        button {
            padding: 15px 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .close-btn {
            background: linear-gradient(45deg, #ff6b6b, #ee5a52);
            color: white;
        }
        
        .test-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #eee;
        }
        
        .logs {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .log-item {
            padding: 5px 0;
            border-bottom: 1px solid #eee;
            font-family: monospace;
            font-size: 14px;
        }
        
        .log-item:last-child {
            border-bottom: none;
        }
        
        .emoji {
            font-size: 20px;
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 20px;
                margin: 10px;
            }
            
            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌉 WebView Bridge Test</h1>
        <p class="subtitle">ทดสอบการสื่อสารระหว่างเว็บกับ Flutter App</p>

        <div class="button-grid">
            <button class="close-btn" onclick="testRegisterSuccess()">
                <span class="emoji">✅</span>
                ส่ง Response Call Back
            </button>
        </div>
        
        <div class="test-section">
            <h3>📋 Test Logs</h3>
            <div id="logs" class="logs"></div>
            <button onclick="clearLogs()" style="margin-top: 10px; padding: 8px 15px; background: #6c757d; color: white;">
                🗑️ ล้าง Logs
            </button>
        </div>
    </div>

    <script>
        function addLog(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString('th-TH');
            const logContainer = document.getElementById('logs');
            const logItem = document.createElement('div');
            logItem.className = 'log-item';
            
            const typeEmoji = {
                'info': 'ℹ️',
                'success': '✅',
                'error': '❌',
                'warning': '⚠️'
            };
            
            logItem.innerHTML = `${typeEmoji[type]} [${timestamp}] ${message}`;
            logContainer.appendChild(logItem);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        function clearLogs() {
            document.getElementById('logs').innerHTML = '';
            addLog('Logs ถูกล้างแล้ว', 'info');
        }

        function testRegisterSuccess() {
            addLog('กำลังส่ง response callback...', 'info');
            
            if (typeof window.closeApp === 'function') {
                addLog('เรียกใช้ window.closeApp() พร้อม response callback', 'success');
                if (typeof window.sendCallback === 'function') {
                    window.sendCallback('{"success":true,"open_page":"TICKET"}');
                } else {
                    window.closeApp('{"success":true,"open_page":"TICKET"}');
                }
            } else if (typeof FlutterApp !== 'undefined') {
                addLog('เรียกใช้ FlutterApp.postMessage("{"success":true,"open_page":"TICKET"}")', 'success');
                FlutterApp.postMessage('{"success":true,"open_page":"TICKET"}');
            } else {
                addLog('ไม่พบ Flutter Bridge - ทดสอบในเบราว์เซอร์ปกติ', 'warning');
                alert('📱 ส่ง Callback: response callback');
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            addLog('หน้าเว็บโหลดเสร็จแล้ว', 'info');
        });

        addLog('🚀 WebView Bridge Test เริ่มต้นแล้ว', 'success');
    </script>
</body>
</html>
